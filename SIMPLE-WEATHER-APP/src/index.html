<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My simple weather app</title>
</head>

<body>
    <h1>Just a simple weather app by OceanTran</h1>
    <div class="input_search">
        <input type="text" placeholder="Enter city name:">
        <button type="button">Search</button>
    </div>

    <div class="weather-info"> <!--style="display: none;">-->
        <p class="city_name"></p>

        <!-- Weather info-->
        <div class="weather">
            <p class="info"></p>
            <p class="description"></p>
        </div>

        <p class="temp"></p>
        <p class="wind_speed"></p>

        <img class="weather_icon" src="" alt="Weather icon">
    </div>

    <script src="script.js"></script>
</body>
</html>
