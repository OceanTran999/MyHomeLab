  victim_dvwa:
    image: vulnerables/web-dvwa
    container_name: dvwa_container
    ports:
      - 80:80
    restart: unless-stopped
    networks:
      macvlan_l3:
        ipv4_address: 10.0.9.2

  victim_bwapp:
    image: hackersploit/bwapp-docker
    container_name: bwapp_container
    ports:
      - 99:99
    restart: unless-stopped
    networks:
      macvlan_l3:
        ipv4_address: 10.0.9.3
  
