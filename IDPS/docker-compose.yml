networks:
  macvlan_l3:
    name: my_macvlan_l3
    driver: macvlan
    driver_opts:
      parent: ens33
      macvlan_mode: bridge
    ipam:
      config:
        - subnet: 10.0.9.0/24
          ip_range: 10.0.9.16/28
          gateway: 10.0.9.1