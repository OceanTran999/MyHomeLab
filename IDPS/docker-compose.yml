  snort_ids:
    image: ciscotalos/snort3:latest
    container_name: snort_container
    tty: true
    networks:
      macvlan_l3:
        ipv4_address: 10.0.9.3

  victim_dvwa:
    image: vulnerables/web-dvwa
    container_name: dvwa_container
    ports:
      - 80:80
    restart: unless-stopped
    networks:
      macvlan_l3:
        ipv4_address: 10.0.9.4

